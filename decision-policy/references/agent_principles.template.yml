version: 1
updated: "YYYY-MM-DDTHH:MM:SSZ"

# Ranked principles are sieves for open implementation choices.
# Sieves applied in the order of rank one by one until a principle suitable to resolve open question is found or no principles left.
# Keep this file short enough that agents will actually read it.

priorities:
  - id: user-convenience
    rank: 1
    statement: "Prefer lower-friction user flows when product risk remains acceptable."
    prefer:
      - "fewer steps"
      - "clear recovery paths"
      - "minimal required input"

  - id: delivery-speed
    rank: 2
    statement: "Prefer the fastest implementation that fits existing repo patterns."
    prefer:
      - "small diffs"
      - "existing components"
      - "no new infrastructure"
      - "boring implementation over clever abstraction"

  - id: maintainability
    rank: 3
    statement: "Avoid new abstractions unless the current task clearly needs them."
    prefer:
      - "local changes"
      - "clear names"
      - "tested existing patterns"
      - "explicit code over premature generalization"

precedence:
  - explicit_user_instruction
  - current_prd_or_issue
  - agent_principles # this file
  - decisions_log_precedents # decisions_log.yml
  - existing_repo_conventions
  - agent_judgement
